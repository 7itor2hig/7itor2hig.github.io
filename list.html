<!DOCTYPE HTML>  
<html>  
    <head>
        <link rel="stylesheet" href="styles.css">
        <link rel="stylesheet" href="table_style.css">
        <title>My Webpage Title</title>
    </head>
    <body>  
        <!---Navigation--->
        <!--This section of code defines the navigation bar at the top of the page.  The classes used here are defined in the style.css file.-->
        <nav class="navbar navbar-expand-lg bg-secondary text-uppercase fixed-top" id="mainNav">
            <div class="container">
                <!--This code defines the "My Webpage" link in th e top right corner of the navigation pane-->
                <a class="navbar-brand" href="">My Webpage</a>
                <!--This code defines the "List" link in the top left corner of the navigation pane-->
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item mx-0 mx-lg-1"><a class="nav-link py-3 px-0 px-lg-3 rounded" href="./list.html">List</a></li>
                </ul>
            </div>
        </nav>
        <!--This code creates the middle section of the webpage-->
        <header class="masthead bg-primary text-white text-center">
            <h1>My Previous Roles</h1>
        </header>
        <!--Here is where the table will be loaded in.  The actual table will be loaded in JavaScript.-->
        <section class="mt-5 text-center">
            <div id="showDataJSON"></div>
        </section>
    </body>

    <script>
  fetch('./list_data.json')
    .then(r => r.json())
    .then(data => {
      // Normalize data whether it's an array or an object with a single array property
      let rows;
      if (Array.isArray(data)) {
        rows = data;                // top-level array (your current file)
      } else {
        const firstKey = Object.keys(data)[0];
        rows = Array.isArray(data[firstKey]) ? data[firstKey] : [];
      }

      const mount = document.getElementById('showDataJSON');
      if (!rows.length) {
        mount.textContent = 'No data found.';
        return;
      }

      // Build a simple table from object keys
      const table = document.createElement('table');
      table.className = 'table table-striped table-bordered';
      table.style.width = '75%';

      const thead = table.createTHead();
      const headRow = thead.insertRow();
      const columns = Object.keys(rows[0]);
      columns.forEach(h => {
        const th = document.createElement('th');
        th.textContent = h;
        headRow.appendChild(th);
      });

      const tbody = table.createTBody();
      rows.forEach(obj => {
        const tr = tbody.insertRow();
        columns.forEach(k => {
          const td = tr.insertCell();
          td.textContent = obj[k] ?? '';
        });
      });

      mount.innerHTML = '';
      mount.appendChild(table);
    })
    .catch(err => {
      console.error(err);
      document.getElementById('showDataJSON').textContent = 'Error loading data.';
    });
</script>
</html>
